name: Interop Gates

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      require_external:
        description: "Fail if external-peer scenarios are unresolved"
        type: boolean
        default: false

jobs:
  interop:
    runs-on: windows-latest
    env:
      NOXTLS_TLS13_E2_CMD: ${{ secrets.NOXTLS_TLS13_E2_CMD }}
      NOXTLS_TLS13_E3_CMD: ${{ secrets.NOXTLS_TLS13_E3_CMD }}
      NOXTLS_TLS13_E4_CMD: ${{ secrets.NOXTLS_TLS13_E4_CMD }}
      NOXTLS_TLS13_E5_CMD: ${{ secrets.NOXTLS_TLS13_E5_CMD }}
      NOXTLS_TLS12_E2_CMD: ${{ secrets.NOXTLS_TLS12_E2_CMD }}
      NOXTLS_DTLS12_E1_CMD: ${{ secrets.NOXTLS_DTLS12_E1_CMD }}
      REQUIRE_EXTERNAL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.require_external == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2

      - name: Ensure OpenSSL is available
        shell: pwsh
        run: |
          if (-not (Get-Command openssl -ErrorAction SilentlyContinue)) {
            choco install openssl.light -y
          }
          openssl version

      - name: Run TLS 1.3 interop matrix
        shell: pwsh
        run: |
          $params = @{}
          if ($env:REQUIRE_EXTERNAL -eq "true") {
            $params["RequireExternal"] = $true
          }
          if (-not [string]::IsNullOrWhiteSpace($env:NOXTLS_TLS13_E2_CMD)) {
            $params["CNoxtlsTls13Command"] = $env:NOXTLS_TLS13_E2_CMD
          }
          if (-not [string]::IsNullOrWhiteSpace($env:NOXTLS_TLS13_E3_CMD)) {
            $params["Tls13ZeroRttExternalCommand"] = $env:NOXTLS_TLS13_E3_CMD
          }
          if (-not [string]::IsNullOrWhiteSpace($env:NOXTLS_TLS13_E4_CMD)) {
            $params["Tls13PqPureExternalCommand"] = $env:NOXTLS_TLS13_E4_CMD
          }
          if (-not [string]::IsNullOrWhiteSpace($env:NOXTLS_TLS13_E5_CMD)) {
            $params["Tls13PqHybridExternalCommand"] = $env:NOXTLS_TLS13_E5_CMD
          }
          & ./scripts/run_tls13_interop_matrix.ps1 @params

      - name: Run TLS 1.2 / DTLS 1.2 interop matrix
        shell: pwsh
        run: |
          $params = @{}
          if ($env:REQUIRE_EXTERNAL -eq "true") {
            $params["RequireExternal"] = $true
          }
          if (-not [string]::IsNullOrWhiteSpace($env:NOXTLS_TLS12_E2_CMD)) {
            $params["CNoxtlsTls12Command"] = $env:NOXTLS_TLS12_E2_CMD
          }
          if (-not [string]::IsNullOrWhiteSpace($env:NOXTLS_DTLS12_E1_CMD)) {
            $params["Dtls12ExternalCommand"] = $env:NOXTLS_DTLS12_E1_CMD
          }
          & ./scripts/run_tls12_interop_matrix.ps1 @params

      - name: Enforce interop matrix failure policy
        shell: pwsh
        run: |
          $paths = @(
            "artifacts/interop/tls13_matrix_results.json",
            "artifacts/interop/tls12_matrix_results.json"
          )

          $blocking = @()
          foreach ($path in $paths) {
            if (-not (Test-Path $path)) {
              throw "Missing interop artifact: $path"
            }

            $summary = Get-Content $path -Raw | ConvertFrom-Json
            foreach ($entry in $summary.matrix) {
              if ($entry.status -eq "FAIL") {
                $blocking += "$($entry.id): $($entry.notes)"
              }
              elseif ($env:REQUIRE_EXTERNAL -eq "true" -and $entry.mode -eq "external" -and $entry.status -ne "PASS") {
                $blocking += "$($entry.id): external scenario unresolved ($($entry.status))"
              }
            }
          }

          if ($blocking.Count -gt 0) {
            $blocking | ForEach-Object { Write-Host $_ -ForegroundColor Red }
            throw "Interop gate failed"
          }

      - name: Upload interop artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: interop-matrix-results
          path: artifacts/interop/*.json
