name: Publish Crates

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  # Publishes only shippable crates. `noxtls-test` has `publish = false` and is intentionally omitted.
  publish:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish noxtls-core
        run: cargo publish -p noxtls-core

      - name: Wait for index propagation (core)
        run: sleep 30

      - name: Publish noxtls-platform
        run: cargo publish -p noxtls-platform

      - name: Publish noxtls-pem
        run: cargo publish -p noxtls-pem

      - name: Publish noxtls-crypto
        run: cargo publish -p noxtls-crypto

      - name: Wait for index propagation (crypto stack)
        run: sleep 30

      - name: Publish noxtls-io
        run: cargo publish -p noxtls-io

      - name: Publish noxtls-psa
        run: cargo publish -p noxtls-psa

      - name: Publish noxtls-x509
        run: cargo publish -p noxtls-x509

      - name: Wait for index propagation (x509)
        run: sleep 30

      - name: Publish noxtls
        run: cargo publish -p noxtls
