# Deploy the Docusaurus site under docs/ to GitHub Pages (versioned docs, /docs/intro, etc.).
#
# Prerequisite (one-time in the GitHub repo):
#   Settings → Pages → Build and deployment → Source: GitHub Actions
#
# Custom domain (rsdocs.noxtls.com): Settings → Pages → Custom domain
#   DNS: CNAME rsdocs → <org>.github.io (or your Pages host as documented by GitHub)

name: Deploy docs (Docusaurus)

on:
  push:
    branches: [main, master]
    paths:
      - "docs/**"
      - "scripts/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Regenerate API and release notes
        working-directory: docs
        run: npm run docs:sync

      - name: Build Docusaurus
        working-directory: docs
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
